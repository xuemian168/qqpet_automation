name: 功能建议
description: 提出新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        在动手写之前，先看看 [CONTRIBUTING.md](https://github.com/xuemian168/qqpet_automation/blob/main/CONTRIBUTING.md) 里的"红线"——
        商业化功能、绕过腾讯运营业务、引入腾讯专有素材的提议会被直接关闭。

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你为什么需要这个功能？解决什么实际问题？
      placeholder: |
        在 Linux 桌面环境下没法用 macOS 的 screencapture 截图，
        宠物截图功能完全不可用。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议的方案
      description: 大致怎么实现，最好能说清楚边界和取舍
      placeholder: |
        在 Linux 平台调用 gnome-screenshot / scrot / grim（按 X11/Wayland 区分）。
        失败时降级到现有的 Electron desktopCapturer API。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他替代方案
      description: 现有方法能不能绕过？为什么不够？
      placeholder: 用户可以截全屏后裁剪，但操作不直观且无法对接 CLI。

  - type: dropdown
    id: scope
    attributes:
      label: 是否符合项目定位
      description: 本项目仅限研究 / 怀旧 / 移植 / 隐私加固，**非商业**
      options:
        - 是，纯怀旧 / 兼容性 / 体验改进
        - 是，逆向研究或文档完善
        - 是，开发者工具 / CLI / CI 改进
        - 不确定（请在描述里说明）
    validations:
      required: true

  - type: checkboxes
    id: prereq
    attributes:
      label: 提交前确认
      options:
        - label: 这个建议不涉及商业化（付费、广告、代练、刷资源等）
          required: true
        - label: 这个建议不涉及连接腾讯线上服务或伪造身份
          required: true
        - label: 我已搜过现有 Issue 没有重复
          required: true
